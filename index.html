<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My First Website</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f4f4;
      text-align: center;
    }
    header {
      background: #333;
      color: #fff;
      padding: 15px;
    }
    section {
      padding: 20px;
    }
    footer {
      background: #333;
      color: #fff;
      padding: 10px;
      position: fixed;
      bottom: 0;
      width: 100%;
    }
    button {
      padding: 10px 20px;
      background: #007BFF;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

<header>
  <h1>Welcome to My Website</h1>
</header>

<section>
  <p>This is my first simple HTML website 🚀</p>
  <button onclick="sayHello()">Click Me</button>
</section>

<footer>
  <p>© 2026 My Website</p>
</footer>

<script>
  function sayHello() {
    alert("Hello! Thanks for visiting.");
  }
</script>

</body>
</html>
